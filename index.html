<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syllabus Tracker Stable</title>
<style>
body{font-family:sans-serif;background:#f5f6fa;margin:0;padding:10px}
.card{background:#fff;padding:10px;margin-bottom:10px;border-radius:10px}
button{padding:6px 10px;margin:2px}
.progress{height:6px;background:#ddd;border-radius:10px}
.bar{height:6px;background:#4f46e5}
.topic{display:flex;justify-content:space-between;margin:4px 0}
.hidden{display:none}
.rev{background:#fde68a}
</style>
</head>
<body><h3>Tracker</h3><div class="card">
Progress: <span id="p">0%</span>
<div class="progress"><div id="bar" class="bar"></div></div>
</div><div class="card">
<button onclick="toggleRevPanel()">Revision</button>
<button onclick="closeAll()">Close all</button>
</div><div id="revPanel" class="card hidden"></div><div class="card">
<input id="subInput" placeholder="Add subject">
<button onclick="addSub()">Add</button>
</div><div id="root"></div><script>
let data = JSON.parse(localStorage.getItem('data')) || [];

function save(){
 localStorage.setItem('data', JSON.stringify(data));
 render();
}

function addSub(){
 let v=document.getElementById('subInput').value.trim();
 if(!v) return;
 data.push({name:v,open:false,chapters:[]});
 document.getElementById('subInput').value='';
 save();
}

function toggleSub(i){
 data[i].open=!data[i].open;
 save();
}

function closeAll(){
 data.forEach(s=>s.open=false);
 save();
}

function addChap(i){
 let v=prompt('Chapter');
 if(!v) return;
 data[i].chapters.push({name:v,topics:[]});
 save();
}

function addTop(i,j){
 let v=prompt('Topic');
 if(!v) return;
 data[i].chapters[j].topics.push({name:v,done:false,rev:false});
 save();
}

function toggleDone(i,j,k){
 let t=data[i].chapters[j].topics[k];
 t.done=!t.done;
 save();
}

function toggleRev(i,j,k){
 let t=data[i].chapters[j].topics[k];
 t.rev=!t.rev;
 save();
}

function delSub(i){ data.splice(i,1); save(); }
function delChap(i,j){ data[i].chapters.splice(j,1); save(); }
function delTop(i,j,k){ data[i].chapters[j].topics.splice(k,1); save(); }

function prog(){
 let tot=0,done=0;
 data.forEach(s=>s.chapters.forEach(c=>c.topics.forEach(t=>{tot++; if(t.done) done++;})));
 return tot?Math.round(done/tot*100):0;
}

function toggleRevPanel(){
 document.getElementById('revPanel').classList.toggle('hidden');
}

function renderRev(){
 let p=document.getElementById('revPanel');
 p.innerHTML='';
 let any=false;
 data.forEach(s=>{
  s.chapters.forEach(c=>{
   c.topics.forEach(t=>{
    if(t.rev){
     any=true;
     let d=document.createElement('div');
     d.className='card';
     d.innerText=s.name+' > '+c.name+' > '+t.name;
     p.appendChild(d);
    }
   });
  });
 });
 if(!any) p.innerHTML='No revision topics';
}

function render(){
 document.getElementById('p').innerText=prog()+'%';
 document.getElementById('bar').style.width=prog()+'%';
 renderRev();

 let root=document.getElementById('root');
 root.innerHTML='';

 data.forEach((s,i)=>{
  let d=document.createElement('div');
  d.className='card';

  let head=document.createElement('div');
  head.innerHTML=(s.open?'▼ ':'▶ ')+s.name;
  head.onclick=function(){toggleSub(i)};

  let controls=document.createElement('div');
  controls.innerHTML='<button onclick="addChap('+i+')">+</button><button onclick="delSub('+i+')">🗑</button>';

  let row=document.createElement('div');
  row.style.display='flex';
  row.style.justifyContent='space-between';
  row.appendChild(head);
  row.appendChild(controls);

  d.appendChild(row);

  let bar=document.createElement('div');
  bar.className='progress';
  let b=document.createElement('div');
  b.className='bar';
  b.style.width=prog()+'%';
  bar.appendChild(b);
  d.appendChild(bar);

  if(s.open){
   s.chapters.forEach((c,j)=>{
    let cd=document.createElement('div');
    cd.innerHTML=c.name+' <button onclick="addTop('+i+','+j+')">+</button> <button onclick="delChap('+i+','+j+')">🗑</button>';

    c.topics.forEach((t,k)=>{
     let td=document.createElement('div');
     td.className='topic';

     let left=document.createElement('span');
     left.innerHTML='<input type="checkbox" '+(t.done?'checked':'')+' onchange="toggleDone('+i+','+j+','+k+')"> '+t.name;
     if(t.done) left.style.textDecoration='line-through';

     let right=document.createElement('span');
     right.innerHTML='<button onclick="toggleRev('+i+','+j+','+k+')">R</button> <button onclick="delTop('+i+','+j+','+k+')">🗑</button>';
     if(t.rev) td.classList.add('rev');

     td.appendChild(left);
     td.appendChild(right);
     cd.appendChild(td);
    });

    d.appendChild(cd);
   });
  }

  root.appendChild(d);
 });
}

render();
</script></body>
</html>
